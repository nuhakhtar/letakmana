<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sorting Game 🎮</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', cursive, sans-serif;
            /* Multiple fallbacks */
            background-color: #667eea;
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            overflow: hidden;
            touch-action: none;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* Dark overlay - ADJUST THIS VALUE: 0.0 = no dark, 1.0 = completely black */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3); /* 30% dark - change to 0.2 for lighter or 0.5 for darker */
            pointer-events: none;
            z-index: 0;
        }

        /* --- HEADER --- */
        #header {
            text-align: center;
            padding: 15px;
            background: rgba(255,255,255,0.95);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: relative;
            z-index: 10;
        }

        h1 {
            color: #FF6B6B;
            font-size: 2rem;
            margin-bottom: 5px;
        }

        #level-indicator {
            font-size: 1.3rem;
            color: #4ECDC4;
            font-weight: bold;
        }

        /* --- GAME AREA --- */
        #game-area {
            position: relative;
            width: 100%;
            height: calc(100vh - 100px);
            max-width: 1200px;
            margin: 0 auto;
            z-index: 5;
        }

        /* --- ZONES --- */
        .zone {
            position: absolute;
            width: 22vmin;
            height: 22vmin;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            transition: all 0.2s;
            border: 4px dashed rgba(255,255,255,0.8);
        }

        .zone span.label {
            position: absolute;
            bottom: 15px;
            font-size: 2.5vmin;
            color: #555;
            font-weight: bold;
            background: rgba(255,255,255,0.9);
            padding: 5px 15px;
            border-radius: 15px;
        }

        /* Zone Positions */
        #zone-1 { top: 8%; left: 5%; }
        #zone-2 { top: 8%; right: 5%; }
        #zone-3 { top: 55%; left: 5%; }
        #zone-4 { top: 55%; right: 5%; }

        .zone.hover {
            transform: scale(1.15);
            box-shadow: 0 12px 30px rgba(0,0,0,0.3);
            border-color: #FF6B6B;
            border-style: solid;
            z-index: 5;
        }

        /* --- DRAGGABLE OBJECT --- */
        #draggable {
            position: absolute;
            width: 15vmin;
            height: 15vmin;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            cursor: grab;
            z-index: 10;
            user-select: none;
            touch-action: none;
            transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                        left 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275),
                        transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: white;
            font-size: 8vmin;
        }

        #draggable.dragging {
            cursor: grabbing;
            transform: scale(1.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            z-index: 100;
        }

        /* --- POPUP MODAL --- */
        #modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 40px 60px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-content h2 {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .modal-content.correct h2 { color: #4CAF50; }
        .modal-content.incorrect h2 { color: #FF6B6B; }

        .modal-content button {
            font-family: inherit;
            font-size: 1.5rem;
            padding: 15px 40px;
            border: none;
            border-radius: 25px;
            background: #4ECDC4;
            color: white;
            cursor: pointer;
            box-shadow: 0 5px 0 #3dbdb5;
            transition: all 0.1s;
            margin: 5px;
        }

        .modal-content button:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #3dbdb5;
        }

        .modal-content button:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 #3dbdb5;
        }

        .modal-content button.secondary {
            background: #FF6B6B;
            box-shadow: 0 5px 0 #d9534f;
        }

        .modal-content button.secondary:hover {
            box-shadow: 0 7px 0 #d9534f;
        }

        .modal-content button.secondary:active {
            box-shadow: 0 0 0 #d9534f;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* --- PROGRESS BAR --- */
        #progress-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.95);
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1.2rem;
            color: #555;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="header">
        <h1> Where Does It Go?</h1>
        <div id="level-indicator">Level 1</div>
    </div>

    <div id="game-area">
        <div class="zone" id="zone-1">
            <span class="label" id="label-1">Zone 1</span>
        </div>
        <div class="zone" id="zone-2">
            <span class="label" id="label-2">Zone 2</span>
        </div>
        <div class="zone" id="zone-3">
            <span class="label" id="label-3">Zone 3</span>
        </div>
        <div class="zone" id="zone-4">
            <span class="label" id="label-4">Zone 4</span>
        </div>
        <div id="draggable">🗑️</div>
    </div>

    <div id="progress-container">
        <span id="progress-text">Level 1 of 5</span>
    </div>

    <div id="modal">
        <div class="modal-content" id="modal-box">
            <h2 id="modal-text">Yay!</h2>
            <div>
                <button id="next-btn" onclick="nextLevel()">Next Level ➡️</button>
                <button class="secondary" onclick="retryLevel()">Try Again 🔄</button>
            </div>
        </div>
    </div>

    <script>
        // Check if background image loads
        window.addEventListener('load', function() {
            const bgImage = new Image();
            bgImage.onload = function() {
                console.log('✅ Background image loaded successfully!');
            };
            bgImage.onerror = function() {
                console.error('❌ Background image NOT found! Make sure:');
                console.error('1. File is named "background.png" (case-sensitive)');
                console.error('2. File is in the SAME folder as index.html');
                console.error('3. File path is correct');
            };
            bgImage.src = 'background.png';
        });

        /* ============================================
           CONFIGURATION - EASY TO EDIT
           ============================================ */
        
        const CONFIG = {
            USE_IMAGES: false,
            
            SOUNDS: {
                correct: '',
                incorrect: '',
                win: ''
            },
            
            LEVELS: [
                {
                    object: '🗑️',
                    objectName: 'Trash',
                    zones: [
                        { id: 'zone-1', emoji: '👄', label: 'Mouth', color: '#FFD1DC', correct: false },
                        { id: 'zone-2', emoji: '🎒', label: 'Bag', color: '#C1E1C1', correct: false },
                        { id: 'zone-3', emoji: '🌿', label: 'Bush', color: '#AEC6CF', correct: false },
                        { id: 'zone-4', emoji: '🗑️', label: 'Trashbin', color: '#FDFD96', correct: true }
                    ]
                },
                {
                    object: '📦',
                    objectName: 'Box',
                    zones: [
                        { id: 'zone-1', emoji: '👄', label: 'Mouth', color: '#FFD1DC', correct: false },
                        { id: 'zone-2', emoji: '♻️', label: 'Recycle', color: '#C1E1C1', correct: true },
                        { id: 'zone-3', emoji: '🌿', label: 'Bush', color: '#AEC6CF', correct: false },
                        { id: 'zone-4', emoji: '🗑️', label: 'Trash', color: '#FDFD96', correct: false }
                    ]
                },
                {
                    object: '🍎',
                    objectName: 'Apple',
                    zones: [
                        { id: 'zone-1', emoji: '👄', label: 'Eat', color: '#FFD1DC', correct: true },
                        { id: 'zone-2', emoji: '🎒', label: 'Bag', color: '#C1E1C1', correct: false },
                        { id: 'zone-3', emoji: '🌿', label: 'Bush', color: '#AEC6CF', correct: false },
                        { id: 'zone-4', emoji: '🗑️', label: 'Trash', color: '#FDFD96', correct: false }
                    ]
                }
            ]
        };

        /* ============================================
           GAME STATE
           ============================================ */
        
        let currentLevel = 0;
        let isDragging = false;
        let dragOffsetX = 0;
        let dragOffsetY = 0;

        // DOM Elements
        const obj = document.getElementById('draggable');
        const gameArea = document.getElementById('game-area');
        const modal = document.getElementById('modal');
        const modalBox = document.getElementById('modal-box');
        const modalText = document.getElementById('modal-text');
        const levelIndicator = document.getElementById('level-indicator');
        const progressText = document.getElementById('progress-text');
        const nextBtn = document.getElementById('next-btn');

        /* ============================================
           INITIALIZATION
           ============================================ */
        
        function initLevel(levelIndex) {
            const level = CONFIG.LEVELS[levelIndex];
            
            levelIndicator.textContent = `Level ${levelIndex + 1}`;
            progressText.textContent = `Level ${levelIndex + 1} of ${CONFIG.LEVELS.length}`;
            
            level.zones.forEach(zoneConfig => {
                const zone = document.getElementById(zoneConfig.id);
                const label = document.getElementById(`label-${zoneConfig.id.split('-')[1]}`);
                
                zone.style.backgroundColor = zoneConfig.color;
                
                if (CONFIG.USE_IMAGES) {
                    zone.style.backgroundImage = `url(${zoneConfig.emoji})`;
                    label.textContent = zoneConfig.label;
                } else {
                    zone.innerHTML = `
                        <span style="font-size: 6vmin;">${zoneConfig.emoji}</span>
                        <span class="label">${zoneConfig.label}</span>
                    `;
                }
                
                zone.dataset.correct = zoneConfig.correct;
            });
            
            if (CONFIG.USE_IMAGES) {
                obj.style.backgroundImage = `url(${level.object})`;
                obj.textContent = '';
            } else {
                obj.textContent = level.object;
            }
            
            resetObject();
        }

        /* ============================================
           DRAG AND DROP LOGIC
           ============================================ */
        
        obj.addEventListener('pointerdown', (e) => {
            isDragging = true;
            obj.classList.add('dragging');
            obj.style.transition = 'none';
            
            const gameAreaRect = gameArea.getBoundingClientRect();
            const objRect = obj.getBoundingClientRect();
            
            dragOffsetX = e.clientX - objRect.left;
            dragOffsetY = e.clientY - objRect.top;
            
            const currentLeft = objRect.left - gameAreaRect.left;
            const currentTop = objRect.top - gameAreaRect.top;
            
            obj.style.left = currentLeft + 'px';
            obj.style.top = currentTop + 'px';
            obj.style.transform = 'none';
            
            obj.setPointerCapture(e.pointerId);
        });

        document.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            
            const gameAreaRect = gameArea.getBoundingClientRect();
            
            const newLeft = e.clientX - gameAreaRect.left - dragOffsetX;
            const newTop = e.clientY - gameAreaRect.top - dragOffsetY;
            
            obj.style.left = newLeft + 'px';
            obj.style.top = newTop + 'px';
            
            document.querySelectorAll('.zone').forEach(zone => {
                const zoneRect = zone.getBoundingClientRect();
                const objRect = obj.getBoundingClientRect();
                const objCenterX = objRect.left + objRect.width / 2;
                const objCenterY = objRect.top + objRect.height / 2;
                
                if (objCenterX >= zoneRect.left && objCenterX <= zoneRect.right &&
                    objCenterY >= zoneRect.top && objCenterY <= zoneRect.bottom) {
                    zone.classList.add('hover');
                } else {
                    zone.classList.remove('hover');
                }
            });
        });

        document.addEventListener('pointerup', (e) => {
            if (!isDragging) return;
            isDragging = false;
            obj.classList.remove('dragging');
            
            document.querySelectorAll('.zone').forEach(z => z.classList.remove('hover'));
            
            const objRect = obj.getBoundingClientRect();
            const objCenterX = objRect.left + objRect.width / 2;
            const objCenterY = objRect.top + objRect.height / 2;
            
            let droppedZone = null;
            document.querySelectorAll('.zone').forEach(zone => {
                const zoneRect = zone.getBoundingClientRect();
                if (objCenterX >= zoneRect.left && objCenterX <= zoneRect.right &&
                    objCenterY >= zoneRect.top && objCenterY <= zoneRect.bottom) {
                    droppedZone = zone;
                }
            });
            
            if (droppedZone) {
                const isCorrect = droppedZone.dataset.correct === 'true';
                playSound(isCorrect ? 'correct' : 'incorrect');
                showModal(isCorrect);
            }
            
            resetObject();
        });

        /* ============================================
           GAME FUNCTIONS
           ============================================ */
        
        function resetObject() {
            obj.style.transition = 'all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            obj.style.top = '50%';
            obj.style.left = '50%';
            obj.style.transform = 'translate(-50%, -50%)';
        }

        function showModal(isCorrect) {
            modal.style.display = 'flex';
            modalBox.className = 'modal-content ' + (isCorrect ? 'correct' : 'incorrect');
            
            if (isCorrect) {
                modalText.textContent = '🎉 Correct! Great Job!';
                nextBtn.style.display = 'inline-block';
                
                if (currentLevel >= CONFIG.LEVELS.length - 1) {
                    nextBtn.textContent = '🏆 Play Again';
                    playSound('win');
                } else {
                    nextBtn.textContent = 'Next Level ➡️';
                }
            } else {
                modalText.textContent = '❌ Wrong! Try Again!';
                nextBtn.style.display = 'none';
            }
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        function nextLevel() {
            closeModal();
            currentLevel++;
            
            if (currentLevel >= CONFIG.LEVELS.length) {
                currentLevel = 0;
            }
            
            initLevel(currentLevel);
        }

        function retryLevel() {
            closeModal();
            resetObject();
        }

        function playSound(type) {
            const soundPath = CONFIG.SOUNDS[type];
            if (soundPath) {
                const audio = new Audio(soundPath);
                audio.play().catch(e => console.log('Sound play failed:', e));
            }
        }

        /* ============================================
           START GAME
           ============================================ */
        
        initLevel(0);
    </script>
</body>
</html>
